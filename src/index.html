<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sleep Outside | Home</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>

  <body>
    <header class="divider">
      <div class="logo">
        <img src="/images/noun_Tent_2517.svg" alt="tent image for logo" />
        <a href="/index.html"> Sleep<span class="highlight">Outside</span></a>
      </div>
      <div class="cart">
        <a href="cart/index.html">
          </a>
      </div>
      <div class="search-container">
      <div class="search-container">
          <form id="searchForm" action="../product_listing/index.html" method="GET">
            <input 
              type="search" 
              name="search" 
              id="searchInput" 
              placeholder="Search products..." 
              required 
            />
            <button type="submit" id="searchButton">🔍</button>
          </form>
        </div>
    </header>

    <main class="divider">
      <div class="hero">
        <img
          src="/images/banner-sm.jpg"
          srcset="images/banner-sm.jpg 500w, images/banner.jpg"
          alt="image of a high mountain lake"
        />
        <div class="logo logo--square">
          <img src="/images/noun_Tent_2517.svg" alt="tent image for logo" />
          <div>Sleep<span class="highlight">Outside</span></div>
        </div>
        <div class="mission">
          <p>
            Our mission is to provide you with everything you need to sleep
            outside comfortably at an affordable price.
          </p>
        </div>
      </div>

      <section class="product-categories">
        <h2>Our Categories</h2> 
        <div class="category-grid">
          
          <a href="product_listing/index.html?category=tents" class="category-card">
            <img src="https://byui-cse.github.io/wdd330-ww-course/images/category-tents.svg" alt="Tents category listing link" />
            <h3>Tents</h3>
          </a>
          
          <a href="product_listing/index.html?category=backpacks" class="category-card">
            <img src="https://byui-cse.github.io/wdd330-ww-course/images/category-backpacks.svg" alt="Backpacks category listing link" />
            <h3>Backpacks</h3>
          </a>
          
          <a href="product_listing/index.html?category=sleeping-bags" class="category-card">
            <img src="https://byui-cse.github.io/wdd330-ww-course/images/category-sleepingbags.svg" alt="Sleeping Bags category listing link" />
            <h3>Sleeping Bags</h3>
          </a>
          
          <a href="product_listing/index.html?category=hammocks" class="category-card">
            <img src="https://byui-cse.github.io/wdd330-ww-course/images/category-hammocks.svg" alt="Hammocks category listing link" />
            <h3>Hammocks</h3>
          </a>

        </div>
      </section>
    </main>

    <script src="./js/main.js" type="module"></script>
    <footer>
      &copy;2026 ⛺ SleepOutside ⛺ WDD 330 ⛺ BYU-Idaho for BYU-Pathway
      Worldwide Online
    </footer>
  </body>
</html>
