<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sleep Outside | Checkout</title>
    <link rel="stylesheet" href="../css/style.css" />
    <script src="../js/CheckoutProcess.mjs" type="module"></script>
  </head>

  <body>
    <header class="divider" id="main-header"></header>

    <main class="divider">
      <section class="products">
        <h2>Review & Place your Order</h2>
      </section>

      <section class="checkout-form">        
        <form name="checkout">
          <div class="form-inputs">
            <label for="fname">First name</label>
            <input type="text" name="fname" id="fname" autocomplete="given-name" required>
            <label for="lname">Last name</label>
            <input type="text" name="lname" id="lname" autocomplete="family-name" required>
            
            <legend>Address</legend>
            <label for="street">Street Address</label>
            <input type="text" name="street" id="street" autocomplete="address-level1" required>
            <label for="city">City</label>
            <input type="text" name="city" id="city" required>
            <label for="state">State</label>
            <input type="text" name="state" id="state" required>
            <label for="zip">Zip Code</label>
            <input type="text" name="zip" id="zip" required>

            <legend>Payment</legend>
            <label for="cardNumber">Credit Card Number</label>
            <input type="number" name="cardNumber" id="cardNumber" minlength="16" maxlength="16" required>
            <label for="expiration">Expiration Date</label>
            <input type="text" name="expiration" id="expiration" placeholder="MM/YY" pattern="(0[1-9]|1[0-2])\/[0-9]{2}" title="Please enter a valid expiration date in MM/YY format" required>
            <label for="code">Security Code</label>
            <input type="number" name="code" id="code" required>
          </div>

          <div class="summary"></div>
        </form>
      </section>

    </main>
    <footer id="main-footer"></footer>
  </body>
</html>
