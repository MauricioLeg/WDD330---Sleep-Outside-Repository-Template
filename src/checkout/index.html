<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sleep Outside | Checkout</title>
    <link rel="stylesheet" href="../css/style.css" />
    <script src="../js/CheckoutProcess.mjs" type="module"></script>
  </head>

  <body>
    <header class="divider" id="main-header"></header>

    <main class="divider">
      <section class="products">
        <h2>Review & Place your Order</h2>
      </section>
      <form action="">
        <label for="name">Full name</label>
        <input type="text" name="name" id="name" autocomplete="name" required>

        <legend>Address</legend>
        <label for="street">Street</label>
        <input type="text" name="street" id="street" autocomplete="address-level1" required>
        <label for="city">City</label>
        <input type="text" name="city" id="city" required>
        <label for="state">State</label>
        <input type="text" name="state" id="state" required>
        <label for="zip-code">Zip Code</label>
        <input type="text" name="zip-code" id="zip-code" required>

        <legend>Payment</legend>
        <label for="card-number">Credit Card Number</label>
        <input type="number" name="card-number" id="card-number" required>
        <label for="exp-date">Expiration Date</label>
        <input type="number" name="exp-date" id="exp-date" required>
        <label for="sec-code">Security Code</label>
        <input type="number" name="sec-code" id="sec-code" required>

        <div class="summary"></div>
      </form>

    </main>

    <footer id="main-footer"></footer>
  </body>
</html>
