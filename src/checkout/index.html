<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sleep Outside | Checkout</title>
    <link rel="stylesheet" href="../css/style.css" />
    <script src="../js/CheckoutProcess.mjs" type="module"></script>
  </head>

  <body>
    <header class="divider" id="main-header"></header>

    <main class="divider">
      <section class="products">
        <h2>Review & Place your Order</h2>
      </section>

      <section class="checkout-form">        
        <form name="checkout">
          <div class="form-inputs">
            <label for="fname">First name</label>
            <input type="text" name="fname" id="fname" autocomplete="given-name" minlength="2" required>

            <label for="lname">Last name</label>
            <input type="text" name="lname" id="lname" autocomplete="family-name" minlength="2" required>

            <legend>Address</legend>
            <label for="street">Street Address</label>
            <input type="text" name="street" id="street" autocomplete="address-line1" minlength="5" required>

            <label for="city">City</label>
            <input type="text" name="city" id="city" autocomplete="address-level2" minlength="2" required>

            <label for="state">State</label>
            <input
              type="text"
              name="state"
              id="state"
              autocomplete="address-level1"
              minlength="2"
              maxlength="2"
              pattern="[A-Za-z]{2}"
              title="Use a 2-letter state code"
              required
            >

            <label for="zip">Zip Code</label>
            <input
              type="text"
              name="zip"
              id="zip"
              inputmode="numeric"
              autocomplete="postal-code"
              pattern="\d{5}(-\d{4})?"
              title="Use 12345 or 12345-6789"
              required
            >

            <legend>Payment</legend>
            <label for="cardNumber">Credit Card Number</label>
            <input
              type="text"
              name="cardNumber"
              id="cardNumber"
              inputmode="numeric"
              autocomplete="cc-number"
              pattern="\d{16}"
              minlength="16"
              maxlength="16"
              title="Enter 16 digits"
              required
            >

            <label for="expiration">Expiration Date</label>
            <input
              type="text"
              name="expiration"
              id="expiration"
              placeholder="MM/YY"
              inputmode="numeric"
              autocomplete="cc-exp"
              pattern="(0[1-9]|1[0-2])\/[0-9]{2}"
              title="Please enter a valid expiration date in MM/YY format"
              required
            >

            <label for="code">Security Code</label>
            <input
              type="text"
              name="code"
              id="code"
              inputmode="numeric"
              autocomplete="cc-csc"
              pattern="\d{3,4}"
              minlength="3"
              maxlength="4"
              title="Enter the 3 or 4 digit security code"
              required
            >
          </div>

          <div class="summary"></div>
        </form>
      </section>

    </main>
    <footer id="main-footer"></footer>
  </body>
</html>
